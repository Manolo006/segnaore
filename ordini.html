<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="manifest" href="manifest.json">
  <title>POS Ordini - Ristorante</title>
  
  <link rel="stylesheet" href="ordini.css">
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <button class="header-back" onclick="window.location.href='index.html'">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Sala
    </button>
    <div class="header-title">Menu Ordini</div>
    <div class="header-table" id="tableIndicator">Tavolo --</div>
  </header>

  <!-- BODY -->
  <div class="app-body">
    
    <!-- CATEGORIES -->
    <aside class="sidebar-cats" id="catList">
      <!-- Injected by JS -->
    </aside>

    <!-- MAIN MENU GRID -->
    <main class="main-content" id="mainContent">
      <div class="cat-title" id="currentCatTitle">
        <span>🍽️</span> Tutte le categorie
      </div>
      <div class="menu-grid" id="menuGrid">
        <!-- Injected by JS -->
      </div>
    </main>

    <!-- CART PANEL -->
    <div class="cart-overlay" id="cartOverlay"></div>
    <aside class="cart-panel" id="cartPanel">
      <div class="cart-header">
        <h2>Comanda</h2>
        <button class="cart-close-mobile" id="cartCloseBtn">✕</button>
      </div>
      <div class="cart-items" id="cartItems">
        <div class="cart-empty">Il carrello è vuoto</div>
      </div>
      <div class="cart-footer">
        <div class="cart-total-row">
          <span>Totale</span>
          <span id="cartTotal">0.00 €</span>
        </div>
        <button class="btn-send" id="btnSend" disabled onclick="sendOrder()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
          Invia in Cucina
        </button>
      </div>
    </aside>

  </div>

  <!-- MOBILE FAB -->
  <button class="mobile-cart-toggle" id="mobileCartBtn">
    <span>Carrello</span>
    <span id="mobileCartTotal">0.00 €</span>
  </button>

  <script type="module" src="ordini.js"></script>
</body>
</html>
