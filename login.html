<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - Presenze Ristorante</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <div class="login-container">
        <main class="glass-card login-card">
            
            <header class="login-header">
                <h1>Gestionale Ristorante</h1>
                <p>Accedi per timbrare il turno o gestire il personale</p>
            </header>

            <form id="login-form" novalidate>
                
                <div class="input-group">
                    <label for="email">Indirizzo Email</label>
                    <input 
                        type="email" 
                        id="email" 
                        class="input-field" 
                        placeholder="nome@ristorante.com" 
                        required 
                        autocomplete="username"
                    >
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        class="input-field" 
                        placeholder="••••••••" 
                        required 
                        autocomplete="current-password"
                    >
                </div>

                <div class="mt-4">
    <button type="button" id="btn-google" class="btn" style="background: rgba(255, 255, 255, 0.05); border: 1px solid var(--glass-border);">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" style="width: 18px; margin-right: 8px;">
        Accedi con Google
    </button>
</div>
<br>


                <div id="error-message" class="geo-indicator inactive mb-4" style="display: none; width: 100%; justify-content: center;">
                    Email o password errati.
                </div>

                <button type="submit" id="btn-submit" class="btn btn-primary">
                    Accedi
                </button>

            </form>

        </main>
    </div>

    <script type="module" src="js/firebase.js"></script>
    <script type="module" src="js/auth.js"></script>

</body>
</html>
