<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <title>Statistiche e Consumi — RistoGest</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="css/consumi.css">

  <script type="module" src="js/consumi.js"></script>
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <button class="header-back" onclick="window.history.back()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Indietro
    </button>
    <div class="header-title">Statistiche e Consumi</div>
  </header>

  <!-- MAIN -->
  <main class="main-content">
    <div id="loader" class="loader">Caricamento dati in corso...</div>

    <div id="statsContent" style="display:none;">
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-card__title">Incasso Totale</div>
          <div class="stat-card__value" id="val-revenue">0.00 €</div>
        </div>
        <div class="stat-card">
          <div class="stat-card__title">Ordini Totali</div>
          <div class="stat-card__value" id="val-orders" style="color:var(--text)">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-card__title">Piatti / Drink Venduti</div>
          <div class="stat-card__value" id="val-items" style="color:var(--text)">0</div>
        </div>
      </div>

      <div style="margin-top:24px;">
        <div class="section-title">Piatti e Bevande più venduti</div>
        <div class="items-list" id="itemsList">
          <!-- Populated by JS -->
        </div>
      </div>
    </div>
  </main>

  <nav class="bottom-nav">
    <button class="bnav-item" onclick="window.location.href='index.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Sala
    </button>
    <button class="bnav-item" onclick="window.location.href='lista-ordini.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="12" y2="16"/></svg>
      Scontrini
    </button>
    <button class="bnav-item" onclick="window.location.href='cucina.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>
      Cucina
    </button>
    <button class="bnav-item" onclick="window.location.href='presenze.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      Presenze
    </button>
    <button class="bnav-item active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 3v18h18"/><path d="M18.7 8l-5.1 5.2-2.8-2.7L7 14.3"/></svg>
      Owner
    </button>
  </nav>

</body>
</html>
