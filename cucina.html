<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Cucina (KDS) — RistoGest</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
    import { getDatabase, ref, onValue, update } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js';
    const firebaseConfig = {
      apiKey:            "AIzaSyCtJWFHpz_wSZd7pVxhUdNkGUNjuRXDexc",
      authDomain:        "in-punto.firebaseapp.com",
      databaseURL:       "https://in-punto-default-rtdb.europe-west1.firebasedatabase.app",
      projectId:         "in-punto",
      storageBucket:     "in-punto.firebasestorage.app",
      messagingSenderId: "851521503055",
      appId:             "1:851521503055:web:7e23520cf67641f044cf3a"
    };
    const fbApp = initializeApp(firebaseConfig);
    const db    = getDatabase(fbApp);
    window._db = db;
    window._fbRef = ref;
    window._fbOnValue = onValue;
    window._fbUpdate = update;
    window._fbReady = true;
    console.log('[Cucina] Firebase connesso ✅');
  </script>

  <style>
    :root {
      --bg:        #0a0a0f;
      --bg-2:      #111118;
      --surface:   rgba(255,255,255,0.04);
      --surface-2: rgba(255,255,255,0.07);
      --border:    rgba(255,255,255,0.08);
      --text:      #f1f5f9;
      --text-2:    #94a3b8;
      --text-3:    #475569;
      --accent:    #3b82f6;
      --s-new:     #f59e0b;
      --s-prep:    #3b82f6;
      --s-ready:   #22c55e;
      --radius:    16px;
      font-family: 'Inter', -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--bg); color: var(--text); }
    button { font-family: inherit; cursor: pointer; border: none; outline: none; }
    svg { display: block; }

    /* =========== TOP NAV =========== */
    .topnav {
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      background: rgba(10,10,15,0.95);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(20px);
      flex-shrink: 0;
    }
    .topnav__brand { display: flex; align-items: center; gap: 12px; }
    .topnav__logo {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #f59e0b, #ef4444);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem;
    }
    .topnav__title { font-size: 1.05rem; font-weight: 700; }
    .topnav__sub { font-size: 0.75rem; color: var(--text-2); }
    .topnav__right { display: flex; align-items: center; gap: 16px; }
    .topnav__clock {
      font-size: 1.3rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      letter-spacing: 1px;
    }
    .topnav__btn {
      padding: 8px 16px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text-2);
      border-radius: 10px;
      font-size: 0.85rem;
      font-weight: 600;
      transition: all 0.18s;
      text-decoration: none;
      display: flex; align-items: center; gap: 6px;
    }
    .topnav__btn:hover { background: var(--surface); color: var(--text); }

    /* =========== FILTER BAR =========== */
    .filter-bar {
      height: 52px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 24px;
      background: var(--bg-2);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      overflow-x: auto;
    }
    .filter-chip {
      padding: 6px 14px;
      border-radius: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-2);
      font-size: 0.82rem;
      font-weight: 600;
      transition: all 0.18s;
      white-space: nowrap;
    }
    .filter-chip:hover { color: var(--text); }
    .filter-chip.active { background: rgba(59,130,246,0.15); border-color: rgba(59,130,246,0.4); color: var(--accent); }
    .filter-chip.f-new.active { background: rgba(245,158,11,0.15); border-color: rgba(245,158,11,0.4); color: var(--s-new); }
    .filter-chip.f-prep.active { background: rgba(59,130,246,0.15); border-color: rgba(59,130,246,0.4); color: var(--s-prep); }
    .filter-chip.f-ready.active { background: rgba(34,197,94,0.15); border-color: rgba(34,197,94,0.4); color: var(--s-ready); }

    /* =========== MAIN KDS GRID =========== */
    .kds-wrap {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
      align-content: start;
    }

    /* =========== ORDER TICKET =========== */
    .ticket {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: transform 0.2s, border-color 0.2s;
    }
    .ticket:hover { transform: translateY(-2px); }

    .ticket[data-status="new"]     { border-top: 3px solid var(--s-new); }
    .ticket[data-status="cooking"] { border-top: 3px solid var(--s-prep); }
    .ticket[data-status="ready"]   { border-top: 3px solid var(--s-ready); }

    .ticket__header {
      padding: 14px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
    }
    .ticket__table {
      font-size: 1.15rem;
      font-weight: 800;
      letter-spacing: -0.3px;
    }
    .ticket__meta {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .ticket__timer {
      font-size: 0.85rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      padding: 4px 10px;
      border-radius: 20px;
      background: rgba(255,255,255,0.06);
    }
    .ticket__timer.urgent { background: rgba(239,68,68,0.2); color: #f87171; animation: blink 1s ease infinite; }
    @keyframes blink { 0%,100% { opacity:1 } 50% { opacity:0.6 } }

    .ticket__status-badge {
      font-size: 0.7rem;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    [data-status="new"]     .ticket__status-badge { background: rgba(245,158,11,0.15); color: var(--s-new); }
    [data-status="cooking"] .ticket__status-badge { background: rgba(59,130,246,0.15); color: var(--s-prep); }
    [data-status="ready"]   .ticket__status-badge { background: rgba(34,197,94,0.15);  color: var(--s-ready); }

    /* Items */
    .ticket__items {
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 1;
    }
    .ticket__item {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }
    .ticket__item-name {
      font-size: 0.95rem;
      font-weight: 600;
      flex: 1;
      line-height: 1.3;
    }
    .ticket__item-check {
      width: 22px; height: 22px;
      border-radius: 6px;
      border: 1.5px solid var(--border);
      background: none;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
      cursor: pointer;
    }
    .ticket__item-check.done {
      background: var(--s-ready);
      border-color: var(--s-ready);
    }
    .ticket__item-note {
      font-size: 0.75rem;
      color: #f59e0b;
      margin-top: 2px;
      font-style: italic;
    }
    .ticket__item-qty {
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--accent);
      flex-shrink: 0;
    }
    .ticket__table-note {
      padding: 8px 16px;
      background: rgba(245,158,11,0.07);
      border-top: 1px solid rgba(245,158,11,0.15);
      font-size: 0.8rem;
      color: #f59e0b;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* Actions */
    .ticket__actions {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
    }
    .ticket__btn {
      flex: 1;
      padding: 10px;
      border-radius: 10px;
      font-size: 0.85rem;
      font-weight: 700;
      transition: all 0.18s;
    }
    .ticket__btn--start {
      background: rgba(245,158,11,0.15);
      color: var(--s-new);
      border: 1px solid rgba(245,158,11,0.3);
    }
    .ticket__btn--start:hover { background: rgba(245,158,11,0.25); }
    .ticket__btn--ready {
      background: rgba(34,197,94,0.15);
      color: var(--s-ready);
      border: 1px solid rgba(34,197,94,0.3);
    }
    .ticket__btn--ready:hover { background: rgba(34,197,94,0.25); }
    .ticket__btn--done {
      background: rgba(71,85,105,0.15);
      color: var(--text-3);
      border: 1px solid var(--border);
    }
    .ticket__btn--done:hover { background: rgba(71,85,105,0.25); }

    /* Empty state */
    .kds-empty {
      grid-column: 1/-1;
      text-align: center;
      padding: 80px 20px;
      color: var(--text-3);
    }
    .kds-empty__icon { font-size: 4rem; margin-bottom: 16px; }
    .kds-empty__title { font-size: 1.2rem; font-weight: 700; margin-bottom: 8px; color: var(--text-2); }

    /* Stats bar */
    .stats-bar {
      display: flex;
      gap: 4px;
      background: var(--bg-2);
      border-top: 1px solid var(--border);
      padding: 10px 24px;
      flex-shrink: 0;
      font-size: 0.8rem;
    }
    .stat-pill {
      padding: 4px 12px;
      border-radius: 20px;
      font-weight: 700;
      display: flex; align-items: center; gap: 6px;
    }
    .stat-pill.new  { background: rgba(245,158,11,0.1); color: var(--s-new); }
    .stat-pill.prep { background: rgba(59,130,246,0.1); color: var(--s-prep); }
    .stat-pill.ready{ background: rgba(34,197,94,0.1);  color: var(--s-ready); }

    /* App shell */
    .app { display: flex; flex-direction: column; height: 100vh; padding-bottom: 70px; }

    /* BOTTOM NAV */
    .bottom-nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 70px;
      background: rgba(10,10,15,0.9);
      backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding-bottom: env(safe-area-inset-bottom);
      z-index: 400;
    }
    .bnav-item {
      background: none;
      border: none;
      color: #64748b;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      font-size: 0.7rem;
      font-weight: 600;
      padding: 8px 12px;
      cursor: pointer;
      transition: color 0.2s;
      font-family: inherit;
    }
    .bnav-item svg { width: 24px; height: 24px; }
    .bnav-item.active { color: var(--accent); }

    /* Responsive */
    @media (max-width: 600px) {
      .kds-wrap { grid-template-columns: 1fr; padding: 12px; padding-bottom: 80px; }
      .filter-bar { padding: 0 12px; }
      .topnav { padding: 0 16px; }
    }
  </style>
</head>
<body>
<div class="app">

  <!-- TOP NAV -->
  <nav class="topnav">
    <div class="topnav__brand">
      <div class="topnav__logo">👨‍🍳</div>
      <div>
        <div class="topnav__title">Cucina</div>
        <div class="topnav__sub">Display comande</div>
      </div>
    </div>
    <div class="topnav__right">
      <div class="topnav__clock" id="clockDisplay">--:--</div>
      <a href="index.html" class="topnav__btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Sala
      </a>
    </div>
  </nav>

  <!-- FILTER BAR -->
  <div class="filter-bar">
    <button class="filter-chip f-all active" data-filter="all">🍽️ Tutte</button>
    <button class="filter-chip f-new"  data-filter="new">🟡 In attesa</button>
    <button class="filter-chip f-prep" data-filter="cooking">🔵 In cottura</button>
    <button class="filter-chip f-ready" data-filter="ready">🟢 Pronte</button>
  </div>

  <!-- KDS TICKETS GRID -->
  <main class="kds-wrap" id="kdsGrid">
    <!-- Tickets injected by JS -->
  </main>

  <!-- STATS BAR -->
  <div class="stats-bar">
    <div class="stat-pill new">🟡 <span id="cnt-new">0</span> in attesa</div>
    <div class="stat-pill prep">🔵 <span id="cnt-cooking">0</span> in cottura</div>
    <div class="stat-pill ready">🟢 <span id="cnt-ready">0</span> pronte</div>
  </div>

</div>

<!-- MOBILE BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="bnav-item" onclick="window.location.href='index.html'">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    Sala
  </button>
  <button class="bnav-item" onclick="window.location.href='lista-ordini.html'">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="12" y2="16"/></svg>
    Ordini
  </button>
  <button class="bnav-item active">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>
    Cucina
  </button>
  <button class="bnav-item" onclick="window.location.href='presenze.html'">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
    Presenze
  </button>
</nav>

<script>
/* =====================================================
   FIREBASE LIVE DATA
===================================================== */
let orders = [];
let currentFilter = 'all';

function initApp() {
  if (window._fbReady && window._db) {
    subscribeFirebase();
  } else {
    setTimeout(initApp, 50);
  }
}
initApp();

/* =====================================================
   CLOCK
===================================================== */
function updateClock() {
  const now = new Date();
  document.getElementById('clockDisplay').textContent =
    now.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
}
updateClock();
setInterval(updateClock, 1000);

/* =====================================================
   TIMER FORMATTING
===================================================== */
function formatElapsed(ms) {
  const totalSec = Math.floor(ms / 1000);
  const m = Math.floor(totalSec / 60);
  const s = totalSec % 60;
  return `${m}:${s.toString().padStart(2, '0')}`;
}

/* =====================================================
   RENDER
===================================================== */
function renderTickets() {
  const grid = document.getElementById('kdsGrid');
  const now = Date.now();

  const filtered = currentFilter === 'all'
    ? orders.filter(o => o.status !== 'done')
    : orders.filter(o => o.status === currentFilter);

  if (filtered.length === 0) {
    grid.innerHTML = `
      <div class="kds-empty">
        <div class="kds-empty__icon">👨‍🍳</div>
        <div class="kds-empty__title">Cucina libera!</div>
        <div>Nessuna comanda ${currentFilter === 'all' ? 'in corso' : 'in questa categoria'}.</div>
      </div>`;
    updateStats();
    return;
  }

  grid.innerHTML = filtered.map(order => {
    const elapsed = now - order.createdAt;
    const isUrgent = elapsed > 15 * 60000 && order.status !== 'ready';
    const timerStr = formatElapsed(elapsed);
    const statusLabel = { new: 'In attesa', cooking: 'In cottura', ready: 'Pronta ✅' }[order.status] || '';
    const itemsList = order.items || [];
    const allDone = itemsList.length > 0 && itemsList.every(i => i.done);

    const itemsHtml = itemsList.map(item => {
      const isDone = item.status === 'done';
      const isSelected = item.selected;
      const statusIcon = item.status === 'ready' ? '🟢' : item.status === 'cooking' ? '🔵' : '🟡';
      return `
      <div class="ticket__item">
        <div style="flex:1;">
          <div class="ticket__item-name" style="${isDone ? 'text-decoration:line-through; opacity:0.5;' : ''}">${statusIcon} ${item.name}</div>
          ${item.note ? `<div class="ticket__item-note">📝 ${item.note}</div>` : ''}
        </div>
        <div class="ticket__item-qty">×${item.qty}</div>
        <button class="ticket__item-check ${isSelected ? 'done' : ''}"
          onclick="toggleItem('${order.id}', '${item.id}')">
          ${isSelected ? '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>' : ''}
        </button>
      </div>
    `}).join('');

    const actionsHtml = order.status === 'new' ? `
      <button class="ticket__btn ticket__btn--start" onclick="advanceOrder('${order.id}', 'cooking')">🔵 Inizia cottura</button>
    ` : order.status === 'cooking' ? `
      <button class="ticket__btn ticket__btn--ready" onclick="advanceOrder('${order.id}', 'ready')">🟢 Segna Pronta</button>
    ` : order.status === 'ready' ? `
      <button class="ticket__btn ticket__btn--done" onclick="advanceOrder('${order.id}', 'done')">✅ Consegnata</button>
    ` : '';

    return `
      <div class="ticket" data-status="${order.status}" data-order="${order.id}">
        <div class="ticket__header">
          <div class="ticket__table">🍽️ Tavolo ${order.tableId}</div>
          <div class="ticket__meta">
            <span class="ticket__timer ${isUrgent ? 'urgent' : ''}" id="timer-${order.id}">${timerStr}</span>
            <span class="ticket__status-badge">${statusLabel}</span>
          </div>
        </div>
        <div class="ticket__items">${itemsHtml}</div>
        ${order.tableNote ? `<div class="ticket__table-note">⚠️ ${order.tableNote}</div>` : ''}
        <div class="ticket__actions">${actionsHtml}</div>
      </div>
    `;
  }).join('');

  updateStats();
}

/* =====================================================
   INTERACTIONS
===================================================== */
function advanceOrder(orderId, newStatus) {
  const order = orders.find(o => o.id === orderId);
  if (!order) return;

  // Selezionati oppure tutti (se nessuno è selezionato)
  const itemsList = order.items || [];
  const selectedItems = itemsList.filter(i => i.selected);
  const targets = selectedItems.length > 0 ? selectedItems : itemsList;

  targets.forEach(item => {
    item.status = newStatus;
    item.selected = false; // Deseleziona dopo l'azione
  });

  // Ricalcola stato ordine
  const allDone = itemsList.every(i => i.status === 'done');
  const allReadyOrDone = itemsList.every(i => i.status === 'ready' || i.status === 'done');
  const anyCookingOrReady = itemsList.some(i => i.status === 'cooking' || i.status === 'ready');

  if (allDone) order.status = 'done';
  else if (allReadyOrDone) order.status = 'ready';
  else if (anyCookingOrReady) order.status = 'cooking';
  else order.status = 'new';

  // Firebase sync
  if(window._fbReady && window._db) {
    window._fbUpdate(window._fbRef(window._db, `orders/${orderId}`), { 
      status: order.status,
      items: order.items 
    });
  }

  renderTickets();
}

function toggleItem(orderId, itemId) {
  const order = orders.find(o => o.id === orderId);
  if(!order) return;
  const item = (order.items || []).find(i => i.id === itemId);
  if(!item) return;
  
  item.selected = !item.selected;
  renderTickets();
}

/* =====================================================
   FILTER CHIPS
===================================================== */
document.querySelectorAll('.filter-chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    currentFilter = chip.dataset.filter;
    renderTickets();
  });
});

/* =====================================================
   STATS
===================================================== */
function updateStats() {
  const active = orders.filter(o => o.status !== 'done');
  document.getElementById('cnt-new').textContent    = active.filter(o => o.status === 'new').length;
  document.getElementById('cnt-cooking').textContent = active.filter(o => o.status === 'cooking').length;
  document.getElementById('cnt-ready').textContent   = active.filter(o => o.status === 'ready').length;
}

/* =====================================================
   LIVE TIMERS
===================================================== */
setInterval(() => {
  const now = Date.now();
  orders.forEach(order => {
    if(order.status === 'done') return;
    const el = document.getElementById(`timer-${order.id}`);
    if(!el) return;
    const elapsed = now - order.createdAt;
    el.textContent = formatElapsed(elapsed);
    if(elapsed > 15 * 60000 && order.status !== 'ready') {
      el.classList.add('urgent');
    }
  });
}, 1000);

/* =====================================================
   FIREBASE LIVE SUBSCRIBE (when ready)
===================================================== */
function subscribeFirebase() {
  if(!window._fbReady || !window._db) return;
  const r = window._fbRef(window._db, 'orders');
  window._fbOnValue(r, (snapshot) => {
    const data = snapshot.val();
    if(data) {
      orders = Object.entries(data).map(([id, o]) => ({ id, ...o }));
    } else {
      orders = [];
    }
    renderTickets();
  });
}

/* =====================================================
   INIT
===================================================== */
window.advanceOrder = advanceOrder;
window.toggleItem = toggleItem;

renderTickets();
subscribeFirebase();
</script>
