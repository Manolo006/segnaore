<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="manifest" href="manifest.json">
  <title>Cucina (KDS) — RistoGest</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

  <script type="module" src="js/cucina.js"></script>

  <link rel="stylesheet" href="css/cucina.css">
</head>
<body>
<div class="app">

  <!-- TOP NAV -->
  <nav class="topnav">
    <div class="topnav__brand">
      <div class="topnav__logo">👨‍🍳</div>
      <div>
        <div class="topnav__title">Cucina</div>
        <div class="topnav__sub">Display comande</div>
      </div>
    </div>
    <div class="topnav__right">
      <div class="topnav__clock" id="clockDisplay">--:--</div>
      <a href="index.html" class="topnav__btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Sala
      </a>
    </div>
  </nav>

  <!-- FILTER BAR -->
  <div class="filter-bar">
    <button class="filter-chip f-all active" data-filter="all">🍽️ Tutte</button>
    <button class="filter-chip f-new"  data-filter="new">🟡 In attesa</button>
    <button class="filter-chip f-prep" data-filter="cooking">🔵 In cottura</button>
    <button class="filter-chip f-ready" data-filter="ready">🟢 Pronte</button>
  </div>

  <!-- KDS TICKETS GRID -->
  <main class="kds-wrap" id="kdsGrid">
    <!-- Tickets injected by JS -->
  </main>

  <!-- STATS BAR -->
  <div class="stats-bar">
    <div class="stat-pill new">🟡 <span id="cnt-new">0</span> in attesa</div>
    <div class="stat-pill prep">🔵 <span id="cnt-cooking">0</span> in cottura</div>
    <div class="stat-pill ready">🟢 <span id="cnt-ready">0</span> pronte</div>
  </div>

</div>

<!-- MOBILE BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="bnav-item" onclick="window.location.href='index.html'">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    Sala
  </button>
  <button class="bnav-item" onclick="window.location.href='lista-ordini.html'">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="12" y2="16"/></svg>
    Ordini
  </button>
  <button class="bnav-item active">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>
    Cucina
  </button>
  <button class="bnav-item" onclick="window.location.href='presenze.html'">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
    Presenze
  </button>
  <button class="bnav-item" onclick="window.location.href='consumi.html'">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 3v18h18"/><path d="M18.7 8l-5.1 5.2-2.8-2.7L7 14.3"/></svg>
    Owner
  </button>
</nav>


</body>
</html>
