<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="img/icon.jpg" type="image/jpeg">
  <title>Cucina (KDS) — RistoGest</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

  <script type="module" src="js/cucina.js"></script>

  <link rel="stylesheet" href="css/cucina.css">
</head>
<body>
<div class="app">

  <!-- TOP NAV -->
  <nav class="topnav">
    <div class="topnav__brand">
      <div class="topnav__logo" style="width:48px; height:48px; border-radius:10px; overflow:hidden; display:flex; align-items:center; justify-content:center;">
        <img src="img/icon.jpg" alt="Logo" style="width:100%; height:100%; object-fit:cover;">
      </div>
    </div>
    <div class="topnav__right">
      <div class="topnav__clock" id="clockDisplay">--:--</div>
    </div>
  </nav>

  <!-- FILTER BAR -->
  <div class="filter-bar">
    <button class="filter-chip f-all active" data-filter="all">🍽️ Tutte</button>
    <button class="filter-chip f-new"  data-filter="new">🟡 In attesa</button>
    <button class="filter-chip f-prep" data-filter="cooking">🔵 In cottura</button>
    <button class="filter-chip f-ready" data-filter="ready">🟢 Pronte</button>
  </div>

  <!-- KDS TICKETS GRID -->
  <main class="kds-wrap" id="kdsGrid">
    <!-- Tickets injected by JS -->
  </main>

  <!-- STATS BAR -->
  <div class="stats-bar">
    <div class="stat-pill new">🟡 <span id="cnt-new">0</span> in attesa</div>
    <div class="stat-pill prep">🔵 <span id="cnt-cooking">0</span> in cottura</div>
    <div class="stat-pill ready">🟢 <span id="cnt-ready">0</span> pronte</div>
  </div>

</div>

<!-- MOBILE BOTTOM NAV -->
<div id="navbar-placeholder"></div>
<script src="js/navbar.js"></script>


</body>
</html>
