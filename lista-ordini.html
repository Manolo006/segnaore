    let currentTab = 'attivi';

    function subscribeFirebase() {
      const r = ref(db, 'orders');
      onValue(r, (snapshot) => {
        const data = snapshot.val();
        if(data) {
          allOrders = Object.entries(data).map(([id, o]) => ({ id, ...o }));
        } else {
          allOrders = [];
        }
        renderReceipts();
      });
    }

    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('tab-' + tab).classList.add('active');
      renderReceipts();
    }
    window.switchTab = switchTab;

    function renderReceipts() {
      const container = document.getElementById('receipts-container');
      
      const ordersToShow = currentTab === 'attivi' 
        ? allOrders.filter(o => !o.paidAt) 
        : allOrders.filter(o => o.paidAt);
        
      if (ordersToShow.length === 0) {
        container.innerHTML = `
          <div style="text-align:center; padding: 40px 20px; color:var(--text-2);">
            <div style="font-size:3rem; margin-bottom:10px;">🧾</div>
            <h3 style="font-weight:600;">Nessun ordine ${currentTab}</h3>
          </div>
        `;
        return;
      }

      // Raggruppamento
      const groups = {};
      ordersToShow.forEach(o => {
        // Se è attivo, raggruppiamo solo per tavolo
        // Se è pagato, raggruppiamo per tavolo_ORARIO
        const tId = o.tableId;
        let groupKey = tId;
        if (currentTab === 'pagati') {
          groupKey = `${tId}_${o.paidAt}`;
        }

        if (!groups[groupKey]) {
          groups[groupKey] = { 
             id: tId, 
             items: [], 
             paidAt: o.paidAt 
          };
        }
        
        (o.items || []).forEach(item => {
           const existing = groups[groupKey].items.find(i => i.name === item.name);
           if (existing) {
             existing.qty += item.qty;
           } else {
             groups[groupKey].items.push({ 
               name: item.name, 
               qty: item.qty, 
               price: catalogPrices[item.name] || 0
             });
           }
        });
      });

      // Ordinamento: per Attivi ordine tavoli crescente, per Pagati dal più recente al più vecchio
      const sortedGroups = Object.values(groups);
      if(currentTab === 'pagati') {
         sortedGroups.sort((a,b) => b.paidAt - a.paidAt);
      } else {
         sortedGroups.sort((a,b) => (a.id === 'Asporto' ? 9999 : a.id) - (b.id === 'Asporto' ? 9999 : b.id));
      }

      let html = '';
      sortedGroups.forEach(group => {
        let total = 0;
        const itemsHtml = group.items.map(item => {
          const rowTotal = item.qty * item.price;
          total += rowTotal;
          const priceStr = item.price > 0 ? `${rowTotal.toFixed(2)} €` : '-- €';
          return `
            <div class="receipt__row">
              <div class="receipt__item">
                <span class="receipt__qty">${item.qty}x</span>
                <span class="receipt__name">${item.name}</span>
              </div>
              <div class="receipt__price">${priceStr}</div>
            </div>
          `;
        }).join('');

        let headerExtra = '';
        if(currentTab === 'pagati' && group.paidAt) {
           const d = new Date(group.paidAt);
           headerExtra = `<div style="font-size:0.8rem; color:var(--text-2); margin-top:4px;">🕒 ${d.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})} - ${d.toLocaleDateString()}</div>`;
        }

        html += `
          <div class="receipt">
            <div class="receipt__header">
              <div style="display:flex; justify-content:space-between; align-items:center;">
                <div class="receipt__table">Tavolo ${group.id}</div>
                <div class="receipt__total">${total.toFixed(2)} €</div>
              </div>
              ${headerExtra}
            </div>
            <div class="receipt__divider"></div>
            <div class="receipt__body">
              ${itemsHtml || '<div style="color:var(--text-2); font-size:0.85rem; text-align:center; padding:10px 0;">(Ordine vuoto)</div>'}
            </div>
          </div>
        `;
      });

      container.innerHTML = html;
    }

    subscribeFirebase();

  <style>
    :root {
      --bg:        #050505;

      --radius:    16px;

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      padding-bottom: 80px;

    /* TOPNAV */
    .topnav {

      display: flex;
      align-items: center;
      padding: 0 20px;
      background: rgba(5,5,5,0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 100;
    }
    .topnav__brand {
      font-size: 1.15rem; font-weight: 700;
      display: flex; align-items: center; gap: 10px;
    }
    .topnav__icon {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, #10b981, #3b82f6);
      border-radius: 8px;
      padding: 0 16px;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 9;
    }
    .tab-btn {
      background: none;
      border: none;
      color: var(--text-2);
      font-size: 0.95rem;
      font-weight: 600;
      padding: 14px 4px;
      cursor: pointer;
      position: relative;
    }
    .tab-btn.active {
      color: var(--text);
    }
    .tab-btn.active::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 0; right: 0;
      height: 3px;
      background: var(--accent);
      border-radius: 3px 3px 0 0;
    }

    .receipts-container {
      padding: 20px 16px 100px 16px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
      align-content: start;
    }

    .receipt {
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      display: flex;
      flex-direction: column;
    }
    .receipt__header {
      display: flex;
      flex-direction: column;
      margin-bottom: 16px;
    }
    .receipt__table {
      font-size: 1.3rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: #fff;
    }
    .receipt__total {
      font-family: 'Space Mono', monospace;
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--accent);
      background: rgba(59,130,246,0.1);
      padding: 4px 10px;
      border-radius: 8px;
    }
    .receipt__divider {
      height: 1px;
      background: dashed 1px rgba(255,255,255,0.15);
      margin-bottom: 16px;
      width: 100%;
    }
    .receipt__body {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .receipt__row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }
    .receipt__item {
      display: flex;
      gap: 10px;
      flex: 1;
    }
    .receipt__qty {
      font-family: 'Space Mono', monospace;
      font-size: 0.95rem;
      font-weight: 700;
      color: #94a3b8;
      min-width: 28px;
    }
    .receipt__name {
      font-size: 0.95rem;
      font-weight: 500;
      line-height: 1.3;
      color: #e2e8f0;
    }
    .receipt__price {
      font-family: 'Space Mono', monospace;
      font-size: 0.95rem;
      color: #cbd5e1;
      white-space: nowrap;
    }

    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0; height: 70px;
      background: rgba(10,10,15,0.9); backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      display: flex; justify-content: space-around; align-items: center;
      padding-bottom: env(safe-area-inset-bottom);
      z-index: 400;
    }
    .bnav-item {
      background: none; border: none; color: var(--text-2);
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      font-size: 0.75rem; font-weight: 600; cursor: pointer;
    }
    .bnav-item svg { width: 24px; height: 24px; }
    .bnav-item.active { color: var(--accent); }
  </style>
