<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Scontrini — RistoGest</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
    import { getDatabase, ref, onValue } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js';

    const firebaseConfig = {
      apiKey:            "AIzaSyCtJWFHpz_wSZd7pVxhUdNkGUNjuRXDexc",
      authDomain:        "in-punto.firebaseapp.com",
      databaseURL:       "https://in-punto-default-rtdb.europe-west1.firebasedatabase.app",
      projectId:         "in-punto",
      storageBucket:     "in-punto.firebasestorage.app",
      messagingSenderId: "851521503055",
      appId:             "1:851521503055:web:7e23520cf67641f044cf3a"
    };
    const fbApp = initializeApp(firebaseConfig);
    const db    = getDatabase(fbApp);

    let allOrders = [];

    const catalogPrices = {
      'Crostino Toscano': 5.00, 'Bruschetta Pomodoro': 4.50, 'Tagliere Salumi': 12.00,
      'Spaghetto allo Scoglio': 14.00, 'Carbonara': 10.00, 'Risotto ai Funghi': 12.00,
      'Gran Tagliere': 18.00, 'Selezione Formaggi': 15.00,
      'Margherita': 7.00, 'Diavola': 8.50,
      'Focaccia Semplice': 3.50, 'Focaccia Crudo': 6.00,
      'Patatine Fritte': 4.00, 'Fritto Misto': 14.00,
      'Tiramisù': 5.50, 'Cheesecake': 6.00,
      'Acqua Naturale 1L': 2.50, 'Coca Cola': 3.50
    };

    function subscribeFirebase() {
      const r = ref(db, 'orders');
      onValue(r, (snapshot) => {
        const data = snapshot.val();
        if(data) {
          allOrders = Object.entries(data).map(([id, o]) => ({ id, ...o }));
        } else {
          allOrders = [];
        }
        renderReceipts();
      });
    }

    function renderReceipts() {
      const container = document.getElementById('receipts-container');
      
      const activeOrders = allOrders.filter(o => o.status !== 'done');
      
      if (activeOrders.length === 0) {
        container.innerHTML = `
          <div style="text-align:center; padding: 40px 20px; color:var(--text-2);">
            <div style="font-size:3rem; margin-bottom:10px;">🧾</div>
            <h3 style="font-weight:600;">Nessun ordine attivo</h3>
            <p>I tavoli sono vuoti o tutti gli ordini sono stati chiusi.</p>
          </div>
        `;
        return;
      }

      const tablesMap = {};
      activeOrders.forEach(o => {
        const tId = o.tableId;
        if (!tablesMap[tId]) tablesMap[tId] = { id: tId, items: [] };
        
        (o.items || []).forEach(item => {
           const existing = tablesMap[tId].items.find(i => i.name === item.name);
           if (existing) {
             existing.qty += item.qty;
           } else {
             tablesMap[tId].items.push({ 
               name: item.name, 
               qty: item.qty, 
               price: catalogPrices[item.name] || 0
             });
           }
        });
      });

      let html = '';
      Object.values(tablesMap).forEach(table => {
        let total = 0;
        const itemsHtml = table.items.map(item => {
          const rowTotal = item.qty * item.price;
          total += rowTotal;
          const priceStr = item.price > 0 ? `${rowTotal.toFixed(2)} €` : '-- €';
          return `
            <div class="receipt__row">
              <div class="receipt__item">
                <span class="receipt__qty">${item.qty}x</span>
                <span class="receipt__name">${item.name}</span>
              </div>
              <div class="receipt__price">${priceStr}</div>
            </div>
          `;
        }).join('');

        html += `
          <div class="receipt">
            <div class="receipt__header">
              <div class="receipt__table">Tavolo ${table.id}</div>
              <div class="receipt__total">${total.toFixed(2)} €</div>
            </div>
            <div class="receipt__divider"></div>
            <div class="receipt__body">
              ${itemsHtml || '<div style="color:var(--text-2); font-size:0.85rem; text-align:center; padding:10px 0;">(Ordine vuoto)</div>'}
            </div>
          </div>
        `;
      });

      container.innerHTML = html;
    }

    subscribeFirebase();
  </script>

  <style>
    :root {
      --bg:        #050505;
      --bg-2:      #111118;
      --surface:   rgba(255,255,255,0.03);
      --surface-2: rgba(255,255,255,0.06);
      --border:    rgba(255,255,255,0.08);
      --text:      #f8fafc;
      --text-2:    #94a3b8;
      --accent:    #3b82f6;
      --radius:    16px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      padding-bottom: 80px;
    }

    /* TOPNAV */
    .topnav {
      height: 60px;
      display: flex;
      align-items: center;
      padding: 0 20px;
      background: rgba(5,5,5,0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 100;
    }
    .topnav__brand {
      font-size: 1.15rem; font-weight: 700;
      display: flex; align-items: center; gap: 10px;
    }
    .topnav__icon {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, #10b981, #3b82f6);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
    }

    /* GRID SCONTRINI */
    .receipts-grid {
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
      align-content: start;
    }

    /* SCONTRINO CARD */
    .receipt {
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      display: flex;
      flex-direction: column;
    }
    .receipt__header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .receipt__table {
      font-size: 1.3rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: #fff;
    }
    .receipt__total {
      font-family: 'Space Mono', monospace;
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--accent);
      background: rgba(59,130,246,0.1);
      padding: 4px 10px;
      border-radius: 8px;
    }
    .receipt__divider {
      height: 1px;
      background: dashed 1px rgba(255,255,255,0.15);
      margin-bottom: 16px;
      width: 100%;
    }
    .receipt__body {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .receipt__row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }
    .receipt__item {
      display: flex;
      gap: 10px;
      flex: 1;
    }
    .receipt__qty {
      font-family: 'Space Mono', monospace;
      font-size: 0.95rem;
      font-weight: 700;
      color: #94a3b8;
      min-width: 28px;
    }
    .receipt__name {
      font-size: 0.95rem;
      font-weight: 500;
      line-height: 1.3;
      color: #e2e8f0;
    }
    .receipt__price {
      font-family: 'Space Mono', monospace;
      font-size: 0.95rem;
      color: #cbd5e1;
      white-space: nowrap;
    }

    /* BOTTOM NAV */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0; height: 70px;
      background: rgba(10,10,15,0.9); backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      display: flex; justify-content: space-around; align-items: center;
      padding-bottom: env(safe-area-inset-bottom);
      z-index: 400;
    }
    .bnav-item {
      background: none; border: none; color: var(--text-2);
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      font-size: 0.75rem; font-weight: 600; cursor: pointer;
    }
    .bnav-item svg { width: 24px; height: 24px; }
    .bnav-item.active { color: var(--accent); }
  </style>
</head>
<body>

  <nav class="topnav">
    <div class="topnav__brand">
      <div class="topnav__icon">🧾</div>
      Scontrini (Ordini Attivi)
    </div>
  </nav>

  <main class="receipts-grid" id="receipts-container">
    <div style="padding:40px; text-align:center; color:var(--text-2); width:100%;">Caricamento ordini...</div>
  </main>

  <!-- MOBILE BOTTOM NAV -->
  <nav class="bottom-nav">
    <button class="bnav-item" onclick="window.location.href='index.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Sala
    </button>
    <button class="bnav-item active" onclick="window.location.href='lista-ordini.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="12" y2="16"/></svg>
      Ordini
    </button>
    <button class="bnav-item" onclick="window.location.href='cucina.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>
      Cucina
    </button>
    <button class="bnav-item" onclick="window.location.href='presenze.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      Presenze
    </button>
  </nav>

</body>
</html>
